<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Community Hub | Noddfa Community Centre</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "background": "#f8f5f5",
              "primary": "#ae0000",
              "secondary": "#1a301a",
              "on-background": "#0f172a",
              "outline": "#ae00001a",
              "on-surface-variant": "#475569",
              "surface": "#ffffff",
              "surface-container": "#f1eeee"
            },
            fontFamily: { "headline": ["Lexend"], "body": ["Lexend"] }
          },
        },
      }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-background font-body text-on-background">

    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">

            <header id="header-placeholder" class="min-h-[72px] relative z-50 bg-white"></header>

            <main class="flex flex-col items-center w-full">
                <header class="relative w-full h-[500px] flex items-center justify-center overflow-hidden">
                    <img alt="Hero" class="absolute inset-0 w-full h-full object-cover" src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070"/>
                    <div class="absolute inset-0 bg-secondary/70 mix-blend-multiply"></div>
                    <div class="relative z-10 text-center px-4 w-full max-w-5xl">
                        <span class="bg-primary text-white text-[10px] font-black px-4 py-1.5 rounded-full mb-4 inline-block uppercase tracking-widest">Village Portal</span>
                        <h1 class="text-5xl md:text-7xl font-headline font-black text-white mb-8 tracking-tighter">Everything Glyncorrwg</h1>
                        <div id="hero-category-pills" class="flex items-center justify-center gap-3 flex-wrap">
                            </div>
                    </div>
                </header>

                <div class="max-w-7xl w-full mx-auto px-6 py-16">
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 mb-20">
                        
                        <div class="lg:col-span-8 space-y-20">
                            <section>
                                <div class="flex items-center justify-between mb-8">
                                    <h2 class="text-3xl font-headline font-bold text-secondary">Village Noticeboard</h2>
                                    <a href="/notices" class="text-primary font-bold text-sm flex items-center gap-2">View All <span class="material-symbols-outlined text-sm">arrow_forward</span></a>
                                </div>
                                <div id="notices-feed" class="space-y-4"></div>
                            </section>

                            <section>
                                <div class="flex items-center justify-between mb-8">
                                    <h2 class="text-3xl font-headline font-bold text-secondary">Local Services</h2>
                                    <a href="/directory?local=true" class="text-primary font-bold text-sm flex items-center gap-2">View All <span class="material-symbols-outlined text-sm">arrow_forward</span></a>
                                </div>
                                <div id="local-services-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-6"></div>
                            </section>
                        </div>

                        <aside class="lg:col-span-4 space-y-8">
                            <div class="bg-white border border-slate-200 rounded-3xl p-8 shadow-sm">
                                <h4 class="text-sm font-black uppercase tracking-widest text-slate-400 mb-6">Current Weather</h4>
                                <div class="flex items-center gap-6">
                                    <span id="weather-icon" class="material-symbols-outlined text-5xl text-primary">light_mode</span>
                                    <div>
                                        <div id="weather-temp" class="text-4xl font-black text-secondary">--°C</div>
                                        <div class="text-sm text-slate-500">Glyncorrwg, Wales</div>
                                    </div>
                                </div>
                            </div>

                            <div class="bg-secondary text-white rounded-3xl p-8 shadow-sm">
                                <h4 class="text-sm font-black uppercase tracking-widest text-white/40 mb-6">Live Transport</h4>
                                <div id="bus-list" class="space-y-6"></div>
                            </div>
                        </aside>
                    </div>

                    <section class="border-t border-slate-200 pt-20">
                        <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-12">
                            <div>
                                <h2 class="text-4xl font-headline font-bold text-secondary">Business Directory</h2>
                                <p class="text-slate-500 mt-2">Supporting local entrepreneurs across the valley.</p>
                            </div>
                            <a href="/directory" class="bg-primary text-white px-8 py-4 rounded-2xl font-bold hover:scale-105 transition-transform">Browse Full Directory</a>
                        </div>
                        <div id="business-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
                    </section>
                </div>
            </main>

            <footer id="footer-placeholder"></footer>
        </div>
    </div>

    <script>
        const API_BASE = 'https://noddfa-j3nkslkrxc.live-website.com/wp-json';

        async function init() {
            loadSharedComponents();
            loadWeather();
            
            // 1. Load Categories for Hero
            const catRes = await fetch(`${API_BASE}/wp/v2/directory_category`);
            const categories = await catRes.json();
            renderHeroPills(categories);

            // 2. Load Directory Data
            const dirRes = await fetch(`${API_BASE}/wp/v2/directory?per_page=100`);
            const allItems = await dirRes.json();
            renderDirectorySections(allItems, categories);

            // 3. Load Notices
            loadNotices();
        }

        function renderHeroPills(cats) {
            document.getElementById('hero-category-pills').innerHTML = cats.map(c => `
                <a href="/directory?category=${c.id}" class="px-6 py-2.5 bg-white/10 backdrop-blur-md border border-white/20 rounded-full text-white text-xs font-bold hover:bg-primary transition-all">
                    ${c.name}
                </a>
            `).join('');
        }

        function renderDirectorySections(items, cats) {
            const locals = items.filter(i => i.directory_meta?.entry_type === 'local').sort(() => 0.5 - Math.random()).slice(0, 4);
            const businesses = items.filter(i => i.directory_meta?.entry_type !== 'local').sort(() => 0.5 - Math.random()).slice(0, 3);

            document.getElementById('local-services-grid').innerHTML = locals.map(i => createCard(i, cats)).join('');
            
            const bizContainer = document.getElementById('business-grid');
            const bizHtml = businesses.map(i => createCard(i, cats)).join('');
            const adHtml = `
                <div class="bg-slate-100 p-8 rounded-[2rem] border-2 border-dashed border-slate-300 flex flex-col justify-center text-center">
                    <span class="material-symbols-outlined text-4xl text-slate-400 mb-4">add_business</span>
                    <h4 class="font-bold text-secondary">Your Business?</h4>
                    <p class="text-xs text-slate-500 mt-2 mb-6">List your business in the directory today.</p>
                    <a href="/contact" class="text-primary font-black text-[10px] uppercase tracking-widest">Get Started</a>
                </div>`;
            bizContainer.innerHTML = bizHtml + adHtml;
        }

        function createCard(item, cats) {
            const meta = item.directory_meta || {};
            const catName = cats.find(c => c.id === item.directory_category[0])?.name || 'Business';
            return `
                <a href="${item.link}" class="group bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all flex flex-col h-full">
                    <div class="flex items-center justify-between mb-6">
                        <div class="w-12 h-12 bg-slate-50 rounded-xl flex items-center justify-center overflow-hidden">
                            ${meta.logo ? `<img src="${meta.logo}" class="w-full h-full object-cover">` : `<span class="material-symbols-outlined text-primary">store</span>`}
                        </div>
                        <span class="text-[9px] font-bold px-3 py-1 bg-slate-50 text-slate-400 rounded-full uppercase">${catName}</span>
                    </div>
                    <h3 class="font-bold text-secondary text-lg mb-1 group-hover:text-primary transition-colors">${item.title.rendered}</h3>
                    <p class="text-sm text-slate-500 line-clamp-2 mb-6">${meta.headline || ''}</p>
                    <div class="mt-auto pt-4 border-t border-slate-50 flex items-center justify-between">
                        <span class="text-[10px] font-bold text-slate-300 uppercase">${meta.foot_note || 'Verified'}</span>
                        <span class="material-symbols-outlined text-primary text-sm">arrow_forward</span>
                    </div>
                </a>`;
        }

        async function loadNotices() {
            const res = await fetch(`${API_BASE}/wp/v2/notices?per_page=3`);
            const data = await res.json();
            document.getElementById('notices-feed').innerHTML = data.map(n => `
                <div class="bg-white p-6 rounded-2xl border border-slate-100 flex items-center justify-between group cursor-pointer" onclick="window.location.href='${n.link}'">
                    <div>
                        <h4 class="font-bold text-secondary group-hover:text-primary transition-colors">${n.title.rendered}</h4>
                        <p class="text-xs text-slate-400 mt-1">Glyncorrwg Village Post</p>
                    </div>
                    <span class="material-symbols-outlined text-slate-300 group-hover:text-primary">chevron_right</span>
                </div>
            `).join('');
        }

        async function loadWeather() {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=51.6617&longitude=-3.6122&current_weather=true`);
            const data = await res.json();
            if(data.current_weather) {
                document.getElementById('weather-temp').innerText = `${Math.round(data.current_weather.temperature)}°C`;
            }
        }

        async function loadSharedComponents() {
            const [h, f] = await Promise.all([fetch(`${API_BASE}/noddfa/v1/header`), fetch(`${API_BASE}/noddfa/v1/footer`)]);
            if (h.ok) document.getElementById('header-placeholder').innerHTML = (await h.json()).html;
            if (f.ok) document.getElementById('footer-placeholder').innerHTML = (await f.json()).html;
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
