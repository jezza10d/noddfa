<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Venue Hire | Noddfa Community Centre</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#ae0000",
                        secondary: "#2a4216",
                        "background-light": "#f8f5f5",
                        "background-dark": "#0a1a18",
                        "forest-dark": "#2d4030",
                        "forest-deep": "#1a301a"
                    },
                    fontFamily: { display: "Lexend" }
                }
            }
        };
    </script>
    <style>
        body { font-family: 'Lexend', sans-serif; }
        /* This makes the map grey/grayscale */
        .grayscale-map {
            filter: grayscale(100%) contrast(1.1) brightness(0.9);
            -webkit-filter: grayscale(100%) contrast(1.1) brightness(0.9);
        }
    </style>
</head>
<body class="bg-background-light font-display text-slate-900 dark:text-slate-100 dark:bg-background-dark">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
    <div class="layout-container flex h-full grow flex-col">

        <div id="header-placeholder"></div>

        <main class="flex flex-col items-center">
            <div class="w-full relative h-[400px] flex items-center justify-center text-center px-6 overflow-hidden">
                <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1519167758481-83f550bb49b3?q=80&w=2074');"></div>
                <div class="absolute inset-0 bg-black/50"></div>
                <div class="relative z-10 max-w-3xl">
                    <h1 class="text-white text-5xl font-extrabold mb-4">Venue Hire</h1>
                    <p class="text-slate-200 text-xl">Book your next event at the heart of Glyncorrwg.</p>
                </div>
            </div>

            <div class="layout-content-container flex flex-col max-w-7xl w-full flex-1 px-6 md:px-20 py-12">
                <div class="flex flex-col lg:flex-row gap-16">
                    
                    <div class="flex-1">
                        <h2 id="enquiry" class="text-3xl font-bold mb-6">Make an Enquiry</h2>
                        <form id="enquiry-form" class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold">Full Name</label>
                                    <input name="full_name" required class="rounded-lg border-slate-200 bg-white dark:bg-forest-deep focus:ring-primary" type="text">
                                </div>
                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold">Email Address</label>
                                    <input name="email" required class="rounded-lg border-slate-200 bg-white dark:bg-forest-deep focus:ring-primary" type="email">
                                </div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold">Event Date</label>
                                    <input name="event_date" required class="rounded-lg border-slate-200 bg-white dark:bg-forest-deep focus:ring-primary" type="date">
                                </div>
                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold">Hall Selection</label>
                                    <select name="hall_selection" class="rounded-lg border-slate-200 bg-white dark:bg-forest-deep focus:ring-primary">
                                        <option value="Main Hall">Main Hall</option>
                                        <option value="Committee Room">Committee Room</option>
                                        <option value="Both Halls">Both Halls</option>
                                    </select>
                                </div>
                            </div>
                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-semibold">Event Description</label>
                                <textarea name="description" class="rounded-lg border-slate-200 bg-white dark:bg-forest-deep focus:ring-primary" rows="4"></textarea>
                            </div>
                            
                            <div class="flex items-center gap-3 p-4 rounded-lg border border-slate-100 bg-white/50">
                                <input type="checkbox" name="newsletter_signup" id="newsletter" class="rounded text-primary focus:ring-primary">
                                <label for="newsletter" class="text-sm font-medium">Join our newsletter list for community updates</label>
                            </div>

                            <button id="submit-btn" class="w-full bg-primary text-white font-bold py-3 rounded-lg hover:bg-primary/90 transition-all" type="submit">Send Enquiry</button>
                            <div id="form-message" class="hidden text-center p-4 rounded-lg font-bold mt-4"></div>
                        </form>
                    </div>

                    <div class="lg:w-1/3">
                        <div class="bg-forest-deep text-white rounded-2xl p-8 shadow-xl">
                            <h3 class="text-xl font-bold mb-6">Contact Us</h3>
                            <div class="space-y-4 mb-8">
                                <p class="text-sm"><span class="font-bold text-primary">Location:</span> Dunraven St, Glyncorrwg</p>
                                <p class="text-sm"><span class="font-bold text-primary">Email:</span> bookings@nccg.org.uk</p>
                            </div>
                            
                            <div class="h-64 w-full rounded-lg overflow-hidden border border-white/10 grayscale-map">
                                <iframe 
                                    width="100%" 
                                    height="100%" 
                                    style="border:0;" 
                                    allowfullscreen="" 
                                    loading="lazy" 
                                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2480.1234!2d-3.6123!3d51.6644!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x486e4096058f488d%3A0xcc4490baead66b70!2sNoddfa%20Community%20Centre!5e0!3m2!1sen!2suk!4v1710000000000">
                                </iframe>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </main>

        <div id="footer-placeholder"></div>
    </div>
</div>

<script>
    // FORM SUBMISSION LOGIC
    const enquiryForm = document.getElementById('enquiry-form');
    const formMessage = document.getElementById('form-message');
    const submitBtn = document.getElementById('submit-btn');

    enquiryForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.innerText = "Sending...";
        
        const formData = new FormData(enquiryForm);
        const payload = Object.fromEntries(formData.entries());
        payload.newsletter_signup = document.getElementById('newsletter').checked;

        try {
            // UPDATED ENDPOINT URL
            const response = await fetch('https://glyncorrwg.wales/wp-json/noddfa/v1/submit-enquiry', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                formMessage.innerText = "Success! We have received your enquiry.";
                formMessage.className = "text-center p-4 rounded-lg font-bold mt-4 bg-green-100 text-green-800";
                enquiryForm.reset();
            } else { throw new Error(); }
        } catch (err) {
            formMessage.innerText = "Submission Error. Please email us directly.";
            formMessage.className = "text-center p-4 rounded-lg font-bold mt-4 bg-red-100 text-red-800";
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "Send Enquiry";
        }
    });

    // LOAD SHARED HEADER/FOOTER
    async function loadShared() {
        try {
            const h = await fetch('https://glyncorrwg.wales/wp-json/noddfa/v1/header');
            if (h.ok) { document.getElementById('header-placeholder').innerHTML = (await h.json()).html; }
            const f = await fetch('https://glyncorrwg.wales/wp-json/noddfa/v1/footer');
            if (f.ok) { document.getElementById('footer-placeholder').innerHTML = (await f.json()).html; }
        } catch (e) {}
    }
    document.addEventListener('DOMContentLoaded', loadShared);
</script>
</body>
</html>
