<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Venue Hire | Noddfa Community Centre</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#ae0000",
                        secondary: "#2a4216",
                        "background-light": "#f8f5f5",
                        "background-dark": "#0a1a18",
                        "forest-dark": "#2d4030",
                        "forest-deep": "#1a301a"
                    },
                    fontFamily: { display: "Lexend" },
                    borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" }
                }
            }
        };
    </script>
    <style>
        .grayscale-map iframe { filter: grayscale(100%) contrast(1.2) brightness(0.9); }
        @media (max-width: 768px) {
            #nav-menu.active-menu {
                display: flex !important;
                flex-direction: column !important;
                gap: 1.5rem !important;
                padding: 2rem !important;
                position: absolute !important;
                top: 72px !important;
                left: 0 !important;
                width: 100% !important;
                background: white !important;
                z-index: 50 !important;
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            }
        }
    </style>
</head>
<body class="bg-background-light font-display text-slate-900 dark:text-slate-100 dark:bg-background-dark">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
    <div class="layout-container flex h-full grow flex-col">
        <header id="header-placeholder" class="min-h-[72px] relative z-50"></header>

        <main class="flex flex-col items-center">
            <div class="w-full">
                <div class="relative w-full h-[300px] md:h-[500px] flex items-center justify-center text-center px-6 overflow-hidden">
                    <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1519167758481-83f550bb49b3?q=80&w=2074');"></div>
                    <div class="absolute inset-0 bg-black/50"></div>
                    <div class="relative z-10 max-w-3xl mx-auto">
                        <span class="bg-primary text-white text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider mb-6 inline-block">Venue Hire</span>
                        <h1 class="text-white text-4xl md:text-6xl font-extrabold leading-tight mb-4">Your Local Venue for Every Occasion</h1>
                    </div>
                </div>
            </div>

            <div class="layout-content-container flex flex-col max-w-7xl w-full flex-1 px-6 md:px-20 py-12">
                <div class="flex flex-col lg:flex-row gap-16 mb-20">
                    <div class="flex-1">
                        <h2 id="enquiry" class="text-3xl font-bold mb-6">Make an Enquiry</h2>
                        <form id="hire-form" class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold">Full Name</label>
                                    <input name="full_name" required class="rounded-lg border-slate-200 dark:border-forest-dark/30 bg-white dark:bg-forest-deep focus:ring-primary" type="text">
                                </div>
                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold">Email Address</label>
                                    <input name="email" required class="rounded-lg border-slate-200 dark:border-forest-dark/30 bg-white dark:bg-forest-deep focus:ring-primary" type="email">
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold">Event Date</label>
                                    <input name="event_date" required class="rounded-lg border-slate-200 dark:border-forest-dark/30 bg-white dark:bg-forest-deep focus:ring-primary" type="date">
                                </div>
                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold">Hall Selection</label>
                                    <select name="hall" class="rounded-lg border-slate-200 dark:border-forest-dark/30 bg-white dark:bg-forest-deep focus:ring-primary">
                                        <option>Main Hall</option>
                                        <option>Committee Room</option>
                                        <option>Both Halls</option>
                                    </select>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end bg-slate-50 dark:bg-forest-deep/50 p-4 rounded-xl border border-slate-100 dark:border-forest-dark/20">
                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold">Start Time</label>
                                    <input name="start_time" id="start_time" class="rounded-lg border-slate-200 dark:border-forest-dark/30 bg-white dark:bg-forest-deep focus:ring-primary disabled:bg-slate-100 disabled:cursor-not-allowed" type="time">
                                </div>
                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold">End Time</label>
                                    <input name="end_time" id="end_time" class="rounded-lg border-slate-200 dark:border-forest-dark/30 bg-white dark:bg-forest-deep focus:ring-primary disabled:bg-slate-100 disabled:cursor-not-allowed" type="time">
                                </div>
                                <div class="flex items-center gap-3 py-2">
                                    <input type="checkbox" name="all_day" id="all_day" class="w-5 h-5 rounded border-slate-300 text-primary focus:ring-primary">
                                    <label for="all_day" class="text-sm font-bold">All Day Event</label>
                                </div>
                            </div>

                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-semibold">Event Description</label>
                                <textarea name="message" class="rounded-lg border-slate-200 dark:border-forest-dark/30 bg-white dark:bg-forest-deep focus:ring-primary" rows="4"></textarea>
                            </div>
                            
                            <button id="submit-btn" class="w-full bg-primary text-white font-bold py-3 rounded-lg hover:bg-primary/90 transition-all shadow-lg" type="submit">Send Enquiry</button>
                            <div id="form-status" class="hidden text-center p-4 rounded-lg font-bold mt-4"></div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
        <div id="footer-placeholder"></div>
    </div>
</div>

<script>
    // Handle All Day Toggle
    const allDayCheck = document.getElementById('all_day');
    const startInput = document.getElementById('start_time');
    const endInput = document.getElementById('end_time');

    allDayCheck.addEventListener('change', () => {
        const isChecked = allDayCheck.checked;
        startInput.disabled = isChecked;
        endInput.disabled = isChecked;
        if(isChecked) {
            startInput.value = '';
            endInput.value = '';
        }
    });

    // Form Handling Logic
    const form = document.getElementById('hire-form');
    const status = document.getElementById('form-status');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.innerText = "Processing...";
        btn.disabled = true;

        const formData = new FormData(form);
        const data = Object.fromEntries(formData);
        // Handle checkbox manually for API
        data.all_day = allDayCheck.checked ? 'Yes' : 'No';

        try {
            const response = await fetch('https://noddfa-j3nkslkrxc.live-website.com/wp-json/noddfa/v1/submit-enquiry', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                status.innerText = "Success! Your enquiry is saved to your account.";
                status.className = "block text-center p-4 rounded-lg font-bold mt-4 bg-green-100 text-green-800";
                form.reset();
            } else { throw new Error("Submission Error"); }
        } catch (err) {
            status.innerText = "Error. Please try again or email us directly.";
            status.className = "block text-center p-4 rounded-lg font-bold mt-4 bg-red-100 text-red-800";
        } finally {
            btn.innerText = "Send Enquiry";
            btn.disabled = false;
        }
    });

    // Load Header/Footer
    async function loadSharedComponents() {
        const base = 'https://noddfa-j3nkslkrxc.live-website.com/wp-json/noddfa/v1';
        try {
            const h = await fetch(`${base}/header`);
            if (h.ok) { document.getElementById('header-placeholder').innerHTML = (await h.json()).html; }
            const f = await fetch(`${base}/footer`);
            if (f.ok) { document.getElementById('footer-placeholder').innerHTML = (await f.json()).html; }
        } catch (e) { console.error(e); }
    }
    document.addEventListener('DOMContentLoaded', loadSharedComponents);
</script>
</body>
</html>
