<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Login | Noddfa Community Centre</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#ae0000",
                        secondary: "#1a301a",
                        "background-light": "#f8f5f5",
                        "background-dark": "#1a301a"
                    },
                    fontFamily: { display: "Lexend" }
                }
            }
        };
    </script>

    <style>
        @media (max-width: 768px) {
            #nav-menu.active-menu {
                display: flex !important;
                flex-direction: column !important;
                gap: 1.5rem !important;
                padding: 2rem !important;
                position: absolute !important;
                top: 72px !important;
                left: 0 !important;
                width: 100% !important;
                background: white !important;
                z-index: 50 !important;
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            }
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">

<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
    <div class="layout-container flex h-full grow flex-col">

        <header id="header-placeholder" class="min-h-[72px] relative z-50"></header>
        
        <main class="flex flex-1 items-center justify-center px-6 py-12 md:py-24">
            <div class="w-full max-w-[440px] bg-white dark:bg-slate-800 p-8 md:p-10 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700">
                
                <div class="text-center mb-10">
                    <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center text-primary mx-auto mb-4">
                        <span class="material-symbols-outlined text-3xl">lock_open</span>
                    </div>
                    <h1 class="text-3xl font-bold text-slate-900 dark:text-white">Welcome Back</h1>
                    <p class="text-slate-500 dark:text-slate-400 mt-2">Access your Noddfa account</p>
                </div>

                <form action="#" method="POST" class="space-y-6">
                    <div>
                        <label for="email" class="block text-sm font-semibold mb-2">Email Address</label>
                        <input type="email" id="email" name="email" required 
                            class="w-full px-4 py-3 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700 focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none"
                            placeholder="name@example.com">
                    </div>

                    <div>
                        <div class="flex justify-between mb-2">
                            <label for="password" class="text-sm font-semibold">Password</label>
                            <a href="#" class="text-xs text-primary font-bold hover:underline">Forgot password?</a>
                        </div>
                        <input type="password" id="password" name="password" required 
                            class="w-full px-4 py-3 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700 focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none"
                            placeholder="••••••••">
                    </div>

                    <div class="flex items-center gap-3">
                        <input type="checkbox" id="remember" class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary">
                        <label for="remember" class="text-sm text-slate-600 dark:text-slate-400">Remember me for 30 days</label>
                    </div>

                    <button type="submit" class="w-full bg-primary text-white font-bold py-4 rounded-lg hover:bg-primary/90 transition-all shadow-md flex items-center justify-center gap-2">
                        Sign In <span class="material-symbols-outlined text-lg">login</span>
                    </button>
                </form>

                <div class="mt-8 pt-8 border-t border-slate-100 dark:border-slate-700 text-center">
                    <p class="text-sm text-slate-500 dark:text-slate-400">
                        Don't have an account? 
                        <a href="#" class="text-primary font-bold hover:underline">Register interest</a>
                    </p>
                </div>
            </div>
        </main>

        <div id="footer-placeholder"></div>

    </div>
</div>

<script>
    const API_BASE = 'https://noddfa-j3nkslkrxc.live-website.com/wp-json';

    async function loadSharedComponents() {
        try {
            const hRes = await fetch(`${API_BASE}/noddfa/v1/header?v=${Date.now()}`);
            if (hRes.ok) {
                const data = await hRes.json();
                document.getElementById('header-placeholder').innerHTML = data.html;
                initMobileMenu();
            }
            const fRes = await fetch(`${API_BASE}/noddfa/v1/footer?v=${Date.now()}`);
            if (fRes.ok) {
                const data = await fRes.json();
                document.getElementById('footer-placeholder').innerHTML = data.html;
            }
        } catch (e) { console.error("Component Loader error", e); }
    }

    function initMobileMenu() {
        const btn = document.getElementById('menu-toggle');
        const nav = document.getElementById('nav-menu');
        if (btn && nav) {
            btn.onclick = (e) => {
                e.preventDefault();
                nav.classList.toggle('active-menu');
                nav.classList.toggle('hidden');
            };
        }
    }

    document.addEventListener('DOMContentLoaded', loadSharedComponents);
</script>
</body>
</html>
