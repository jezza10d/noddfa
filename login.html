<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Login | Noddfa Community Centre</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#ae0000",
                        secondary: "#1a301a",
                        "background-light": "#f8f5f5",
                        "outline-variant": "#e2e8d1",
                        "on-surface-variant": "#475569"
                    },
                    fontFamily: { display: "Lexend" }
                }
            }
        };
    </script>

    <style>
        @media (max-width: 768px) {
            #nav-menu.active-menu {
                display: flex !important;
                flex-direction: column !important;
                gap: 1.5rem !important;
                padding: 2rem !important;
                position: absolute !important;
                top: 72px !important;
                left: 0 !important;
                width: 100% !important;
                background: white !important;
                z-index: 50 !important;
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            }
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Loading spinner animation */
        .spinner {
            animation: rotate 2s linear infinite;
            width: 20px; height: 20px;
        }
        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-background-light font-display text-slate-900">

<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
    <div class="layout-container flex h-full grow flex-col">

        <header id="header-placeholder" class="min-h-[72px] relative z-50"></header>
        
        <main class="flex flex-1 items-center justify-center px-6 py-12 md:py-24">
            <div class="w-full max-w-[400px] bg-white p-8 rounded-xl shadow-sm border border-outline-variant">
                
                <div class="flex flex-col items-center mb-8 text-center">
                    <div class="w-20 h-20 rounded-full bg-primary/5 flex items-center justify-center mb-4 border border-primary/10">
                        <span class="material-symbols-outlined text-primary text-4xl">lock</span>
                    </div>
                    <h2 class="text-2xl font-bold text-secondary">Portal Sign In</h2>
                    <p class="text-on-surface-variant text-sm mt-1">Access your member dashboard</p>
                </div>

                <div id="login-error" class="hidden mb-6 p-4 bg-red-50 border-l-4 border-red-600 text-red-700 text-sm">
                    <p class="font-bold">Login Failed</p>
                    <p id="error-text">Please check your credentials and try again.</p>
                </div>

                <form id="loginForm" class="space-y-4">
                    <div>
                        <label for="email" class="block text-sm font-semibold text-secondary mb-1">Username or Email</label>
                        <input type="text" id="username" name="username" required 
                            class="w-full px-4 py-3 rounded-lg border border-outline-variant focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400"
                            placeholder="Your username">
                    </div>

                    <div>
                        <div class="flex justify-between mb-1">
                            <label for="password" class="text-sm font-semibold text-secondary">Password</label>
                        </div>
                        <input type="password" id="password" name="password" required 
                            class="w-full px-4 py-3 rounded-lg border border-outline-variant focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400"
                            placeholder="••••••••">
                    </div>

                    <div class="flex items-center justify-between text-xs">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="remember" class="rounded border-outline-variant text-primary focus:ring-primary w-4 h-4">
                            <span class="text-on-surface-variant">Remember me</span>
                        </label>
                        <a href="#" class="text-primary font-bold hover:underline">Forgot password?</a>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-primary text-white py-3 rounded-lg font-bold shadow-md hover:bg-opacity-95 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                        <span id="btnText">Sign In</span>
                        <span id="btnSpinner" class="hidden material-symbols-outlined spinner">progress_activity</span>
                    </button>
                </form>

                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-outline-variant"></div></div>
                    <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-on-surface-variant">New to Noddfa?</span></div>
                </div>

                <button onclick="window.location.href='/portal'" class="w-full bg-[#f1eeee] text-secondary py-3 rounded-lg font-bold border border-outline-variant hover:bg-[#e2dede] transition-all active:scale-[0.98]">
                    Create Account
                </button>
            </div>
        </main>

        <div id="footer-placeholder"></div>

    </div>
</div>

<script>
    const API_BASE = 'https://noddfa-j3nkslkrxc.live-website.com/wp-json';

    // 1. Handle Login Functionality
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorContainer = document.getElementById('login-error');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');

        // Reset state
        errorContainer.classList.add('hidden');
        submitBtn.disabled = true;
        btnText.innerText = 'Authenticating...';
        btnSpinner.classList.remove('hidden');

        try {
            // Note: This assumes you have the 'JWT Authentication for WP REST API' plugin installed on WordPress
            const response = await fetch(`${API_BASE}/jwt-auth/v1/token`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Success: Store token and user info
                localStorage.setItem('noddfa_token', data.token);
                localStorage.setItem('noddfa_user_email', data.user_email);
                localStorage.setItem('noddfa_user_nicename', data.user_nicename);
                localStorage.setItem('noddfa_user_display_name', data.user_display_name);

                // Redirect logic: check for "redirect" param in URL, otherwise go to /portal
                const urlParams = new URLSearchParams(window.location.search);
                const redirectTo = urlParams.get('redirect') || '/portal';
                window.location.href = redirectTo;
            } else {
                // Handle WP error messages
                throw new Error(data.message || 'Invalid username or password.');
            }
        } catch (error) {
            console.error('Login Error:', error);
            document.getElementById('error-text').innerText = error.message;
            errorContainer.classList.remove('hidden');
        } finally {
            submitBtn.disabled = false;
            btnText.innerText = 'Sign In';
            btnSpinner.classList.add('hidden');
        }
    });

    // 2. Load Shared Header/Footer
    async function loadSharedComponents() {
        try {
            const [hRes, fRes] = await Promise.all([
                fetch(`${API_BASE}/noddfa/v1/header?v=${Date.now()}`),
                fetch(`${API_BASE}/noddfa/v1/footer?v=${Date.now()}`)
            ]);

            if (hRes.ok) {
                const data = await hRes.json();
                document.getElementById('header-placeholder').innerHTML = data.html;
                initMobileMenu();
            }
            if (fRes.ok) {
                const data = await fRes.json();
                document.getElementById('footer-placeholder').innerHTML = data.html;
            }
        } catch (e) { console.error("Component Loader error", e); }
    }

    function initMobileMenu() {
        const btn = document.getElementById('menu-toggle');
        const nav = document.getElementById('nav-menu');
        if (btn && nav) {
            btn.onclick = (e) => {
                e.preventDefault();
                nav.classList.toggle('active-menu');
                nav.classList.toggle('hidden');
            };
        }
    }

    document.addEventListener('DOMContentLoaded', loadSharedComponents);
</script>
</body>
</html>
