<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Member Access | Noddfa Community Centre</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#ae0000",
                        secondary: "#1a301a",
                        "background-light": "#f8f5f5",
                        "outline-variant": "#e2e8d1"
                    },
                    fontFamily: { display: "Lexend" }
                }
            }
        };
    </script>

    <style>
        .hidden-view { display: none; }
        .spinner { animation: rotate 2s linear infinite; width: 18px; height: 18px; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-background-light font-display text-slate-900">

<div class="relative flex min-h-screen flex-col">
    <header id="header-placeholder" class="min-h-[72px] z-50"></header>
    
    <main class="flex flex-1 items-center justify-center px-6 py-12">
        <div class="w-full max-w-[450px] bg-white p-8 rounded-2xl shadow-sm border border-outline-variant">
            
            <div class="flex flex-col items-center mb-8 text-center">
                <div class="w-16 h-16 rounded-full bg-primary/5 flex items-center justify-center mb-4 border border-primary/10">
                    <span id="header-icon" class="material-symbols-outlined text-primary text-3xl">lock</span>
                </div>
                <h2 id="view-title" class="text-2xl font-bold text-secondary">Portal Sign In</h2>
                <p id="view-subtitle" class="text-slate-500 text-sm mt-1">Access your member dashboard</p>
            </div>

            <div id="status-msg" class="hidden mb-6 p-4 rounded-lg text-sm border-l-4"></div>

            <div id="login-view">
                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-secondary mb-1">Username or Email</label>
                        <input type="text" id="login-user" required class="w-full px-4 py-3 rounded-xl border border-outline-variant outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-secondary mb-1">Password</label>
                        <input type="password" id="login-pass" required class="w-full px-4 py-3 rounded-xl border border-outline-variant outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
                    </div>
                    <div class="flex items-center justify-between text-xs">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="rounded border-outline-variant text-primary focus:ring-primary">
                            <span>Remember me</span>
                        </label>
                        <button type="button" onclick="switchView('forgot')" class="text-primary font-bold hover:underline">Forgot password?</button>
                    </div>
                    <button type="submit" class="w-full bg-primary text-white py-3.5 rounded-xl font-bold shadow-md hover:bg-red-700 transition-all flex justify-center items-center gap-2">
                        <span>Sign In</span>
                        <span class="btn-loader hidden material-symbols-outlined spinner">progress_activity</span>
                    </button>
                </form>
                <div class="mt-8 pt-6 border-t border-outline-variant text-center">
                    <p class="text-sm text-slate-500">New to Noddfa? <button onclick="switchView('register')" class="text-primary font-bold hover:underline">Create an Account</button></p>
                </div>
            </div>

            <div id="register-view" class="hidden-view">
                <form id="registerForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-secondary mb-1">First Name</label>
                            <input type="text" id="reg-fname" required class="w-full px-4 py-3 rounded-xl border border-outline-variant outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-secondary mb-1">Last Name</label>
                            <input type="text" id="reg-lname" required class="w-full px-4 py-3 rounded-xl border border-outline-variant outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-secondary mb-1">Email Address</label>
                        <input type="email" id="reg-email" required class="w-full px-4 py-3 rounded-xl border border-outline-variant outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-secondary mb-1">Create Password</label>
                        <input type="password" id="reg-pass" required class="w-full px-4 py-3 rounded-xl border border-outline-variant outline-none">
                    </div>
                    <button type="submit" class="w-full bg-secondary text-white py-3.5 rounded-xl font-bold shadow-md hover:bg-black transition-all flex justify-center items-center gap-2">
                        <span>Create Account</span>
                        <span class="btn-loader hidden material-symbols-outlined spinner">progress_activity</span>
                    </button>
                </form>
                <button onclick="switchView('login')" class="w-full mt-4 text-sm font-bold text-slate-500 hover:text-secondary">Back to Login</button>
            </div>

            <div id="forgot-view" class="hidden-view text-center">
                <p class="text-sm text-slate-500 mb-6">Enter your email and we'll send you a link to reset your password.</p>
                <form id="forgotForm" class="space-y-4">
                    <input type="email" id="forgot-email" placeholder="email@example.com" required class="w-full px-4 py-3 rounded-xl border border-outline-variant outline-none">
                    <button type="submit" class="w-full bg-primary text-white py-3.5 rounded-xl font-bold transition-all flex justify-center items-center gap-2">
                        <span>Send Reset Link</span>
                        <span class="btn-loader hidden material-symbols-outlined spinner">progress_activity</span>
                    </button>
                </form>
                <button onclick="switchView('login')" class="w-full mt-6 text-sm font-bold text-slate-500 hover:text-secondary">Back to Login</button>
            </div>

            <div id="reset-confirm-view" class="hidden-view">
                <p class="text-sm text-slate-500 mb-6 text-center">Please enter and confirm your new password.</p>
                <form id="resetConfirmForm" class="space-y-4">
                    <input type="password" id="new-pass" placeholder="New Password" required class="w-full px-4 py-3 rounded-xl border border-outline-variant outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
                    <input type="password" id="confirm-pass" placeholder="Confirm New Password" required class="w-full px-4 py-3 rounded-xl border border-outline-variant outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
                    <button type="submit" class="w-full bg-primary text-white py-3.5 rounded-xl font-bold shadow-md hover:bg-red-700 transition-all flex justify-center items-center gap-2">
                        <span>Update Password</span>
                        <span class="btn-loader hidden material-symbols-outlined spinner">progress_activity</span>
                    </button>
                </form>
            </div>

        </div>
    </main>

    <div id="footer-placeholder"></div>
</div>

<script>
    const API_BASE = 'https://noddfa-j3nkslkrxc.live-website.com/wp-json/';

    // 1. View Toggler
    function switchView(view) {
        const views = ['login', 'register', 'forgot', 'reset-confirm'];
        views.forEach(v => {
            const el = document.getElementById(`${v}-view`);
            if(el) el.classList.add('hidden-view');
        });
        
        document.getElementById(`${view}-view`).classList.remove('hidden-view');
        
        const title = document.getElementById('view-title');
        const icon = document.getElementById('header-icon');
        const subtitle = document.getElementById('view-subtitle');
        
        if(view === 'login') { 
            title.innerText = 'Portal Sign In'; 
            icon.innerText = 'lock'; 
            subtitle.innerText = 'Access your member dashboard';
        }
        if(view === 'register') { 
            title.innerText = 'Create Account'; 
            icon.innerText = 'person_add'; 
            subtitle.innerText = 'Join our community hub';
        }
        if(view === 'forgot') { 
            title.innerText = 'Reset Password'; 
            icon.innerText = 'lock_reset'; 
            subtitle.innerText = 'Retrieve your account access';
        }
        if(view === 'reset-confirm') { 
            title.innerText = 'Set New Password'; 
            icon.innerText = 'security'; 
            subtitle.innerText = 'Create a secure new password';
        }
    }

    // 2. Notification Helper
    function showStatus(msg, isError = true) {
        const el = document.getElementById('status-msg');
        el.innerText = msg;
        el.className = `mb-6 p-4 rounded-lg text-sm border-l-4 ${isError ? 'bg-red-50 border-red-600 text-red-700' : 'bg-green-50 border-green-600 text-green-700'}`;
        el.classList.remove('hidden');
    }

    // 3. Form Submissions
    // LOGIN
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.disabled = true; btn.querySelector('.btn-loader').classList.remove('hidden');
        try {
            const res = await fetch(`${API_BASE}jwt-auth/v1/token`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    username: document.getElementById('login-user').value, 
                    password: document.getElementById('login-pass').value 
                })
            });
            const data = await res.json();
            if(res.ok) {
                localStorage.setItem('noddfa_token', data.token);
                localStorage.setItem('noddfa_user_display_name', data.user_display_name);
                window.location.href = '/portal';
            } else { showStatus(data.message || "Invalid credentials. Please try again."); }
        } catch (err) { showStatus("Connection error to WordPress."); }
        btn.disabled = false; btn.querySelector('.btn-loader').classList.add('hidden');
    };

    // REGISTER
    document.getElementById('registerForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.disabled = true; btn.querySelector('.btn-loader').classList.remove('hidden');
        try {
            const res = await fetch(`${API_BASE}noddfa/v1/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('reg-email').value,
                    password: document.getElementById('reg-pass').value,
                    first_name: document.getElementById('reg-fname').value,
                    last_name: document.getElementById('reg-lname').value
                })
            });
            const data = await res.json();
            if(res.ok) {
                showStatus("Account created successfully! You can now sign in.", false);
                switchView('login');
            } else { showStatus(data.message || "Registration failed."); }
        } catch (err) { showStatus("Connection error."); }
        btn.disabled = false; btn.querySelector('.btn-loader').classList.add('hidden');
    };

    // FORGOT PASSWORD
    document.getElementById('forgotForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.disabled = true; btn.querySelector('.btn-loader').classList.remove('hidden');
        try {
            const res = await fetch(`${API_BASE}noddfa/v1/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: document.getElementById('forgot-email').value })
            });
            const data = await res.json();
            if(res.ok) { 
                showStatus("Check your inbox! We've sent a reset link.", false); 
            } else { showStatus(data.message || "Email not found."); }
        } catch (err) { showStatus("Connection error."); }
        btn.disabled = false; btn.querySelector('.btn-loader').classList.add('hidden');
    };

    // CONFIRM NEW PASSWORD
    document.getElementById('resetConfirmForm').onsubmit = async (e) => {
        e.preventDefault();
        const pass = document.getElementById('new-pass').value;
        const confirm = document.getElementById('confirm-pass').value;
        const params = new URLSearchParams(window.location.search);

        if (pass !== confirm) {
            showStatus("Passwords do not match.");
            return;
        }

        const btn = e.target.querySelector('button');
        btn.disabled = true; btn.querySelector('.btn-loader').classList.remove('hidden');

        try {
            const res = await fetch(`${API_BASE}noddfa/v1/confirm-password-reset`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    key: params.get('key'),
                    login: params.get('login'),
                    password: pass
                })
            });
            if (res.ok) {
                showStatus("Password updated! You can now sign in.", false);
                // Remove keys from URL so the view stays clean
                window.history.replaceState({}, document.title, window.location.pathname);
                switchView('login');
            } else {
                showStatus("The reset link has expired or is invalid. Please request a new one.");
            }
        } catch (err) { showStatus("Connection error."); }
        btn.disabled = false; btn.querySelector('.btn-loader').classList.add('hidden');
    };

    // 4. Initial Load Logic
    async function loadComponents() {
        // Detect if we are in Reset Mode
        const params = new URLSearchParams(window.location.search);
        if (params.has('key') && params.has('login')) {
            switchView('reset-confirm');
        }

        const [h, f] = await Promise.all([
            fetch(`${API_BASE}noddfa/v1/header?v=${Date.now()}`),
            fetch(`${API_BASE}noddfa/v1/footer?v=${Date.now()}`)
        ]);
        if (h.ok) document.getElementById('header-placeholder').innerHTML = (await h.json()).html;
        if (f.ok) document.getElementById('footer-placeholder').innerHTML = (await f.json()).html;
    }
    document.addEventListener('DOMContentLoaded', loadComponents);
</script>

</body>
</html>
