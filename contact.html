<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#ae0000",
                        secondary: "#2a4216",
                        "background-light": "#f8f5f5",
                        "background-dark": "#2d3e1d", 
                        "brand-forest": "#2d3e1d", 
                    },
                    fontFamily: {
                        display: ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <title>Contact Us | Noddfa Community Centre</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
    <div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">

            <div id="header-placeholder"></div>

            <main class="flex flex-col items-center">
                <div class="relative w-full h-[300px] md:h-[500px] flex items-center justify-center text-center px-6 overflow-hidden">
                    <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622?q=80&w=2069');"></div>
                    <div class="absolute inset-0 bg-black/50"></div>
                    <div class="relative z-10 max-w-3xl mx-auto">
                        <span class="bg-primary text-white text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider mb-6 inline-block">Get in Touch</span>
                        <h1 id="hero-header" class="text-white text-4xl md:text-6xl font-extrabold leading-tight mb-4">Contact Us</h1>
                        <p class="text-slate-200 text-lg md:text-xl font-medium">We're here to help. Reach out with any questions or booking inquiries.</p>
                    </div>
                </div>

                <div class="layout-content-container flex flex-col max-w-[1200px] w-full flex-1 px-4 md:px-10 py-16">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
                        <div class="space-y-12">
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div class="flex flex-col gap-3 rounded-xl border border-brand-forest/10 bg-white dark:bg-background-dark/40 p-6 shadow-sm">
                                    <span class="material-symbols-outlined text-primary text-3xl">location_on</span>
                                    <h3 class="text-slate-900 dark:text-white text-base font-bold">Address</h3>
                                    <p class="text-slate-600 dark:text-slate-300 text-sm">Dunraven Street, Glyncorrwg, SA13 3AD</p>
                                </div>
                                <div class="flex flex-col gap-3 rounded-xl border border-brand-forest/10 bg-white dark:bg-background-dark/40 p-6 shadow-sm">
                                    <span class="material-symbols-outlined text-primary text-3xl">mail</span>
                                    <h3 class="text-slate-900 dark:text-white text-base font-bold">Email</h3>
                                    <p class="text-slate-600 dark:text-slate-300 text-sm">bookings@nccg.org.uk</p>
                                </div>
                            </div>

                            <div class="bg-white dark:bg-background-dark/40 p-8 rounded-xl border border-brand-forest/10 shadow-sm">
                                <h3 class="text-xl font-bold mb-6 text-slate-900 dark:text-white">Send a Message</h3>
                                <form class="space-y-4">
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <input class="rounded-lg border-slate-200 dark:border-slate-700 bg-background-light dark:bg-slate-900 p-3" placeholder="Name" type="text" />
                                        <input class="rounded-lg border-slate-200 dark:border-slate-700 bg-background-light dark:bg-slate-900 p-3" placeholder="Email" type="email" />
                                    </div>
                                    <textarea class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-background-light dark:bg-slate-900 p-3" rows="4" placeholder="Your message..."></textarea>
                                    <button class="w-full bg-primary text-white font-bold py-3 rounded-lg hover:bg-primary/90 transition-all">Send Message</button>
                                </form>
                            </div>
                        </div>

                        <div class="rounded-xl overflow-hidden shadow-xl min-h-[400px]">
                            <iframe class="w-full h-full border-0" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2480.245847426618!2d-3.6114407!3d51.6553887!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x486e5c5448375487%3A0xc6657c706606679b!2sNoddfa%20Community%20Centre!5e0!3m2!1sen!2suk!4v1710700000000" allowfullscreen="" loading="lazy"></iframe>
                        </div>
                    </div>
                </div>
            </main>

            <div id="footer-placeholder"></div>

        </div>
    </div>

    <script>
        async function loadSharedComponents() {
            try {
                const headerResponse = await fetch('header.html');
                if (headerResponse.ok) {
                    const headerHtml = await headerResponse.text();
                    document.getElementById('header-placeholder').innerHTML = headerHtml;
                    initMobileMenu();
                    highlightActiveLink();
                }

                const footerResponse = await fetch('footer.html');
                if (footerResponse.ok) {
                    const footerHtml = await footerResponse.text();
                    document.getElementById('footer-placeholder').innerHTML = footerHtml;
                }
            } catch (error) {
                console.error("Error loading shared components:", error);
            }
        }

        function initMobileMenu() {
            const toggleBtn = document.getElementById('menu-toggle');
            const navMenu = document.getElementById('nav-menu');
            if (toggleBtn && navMenu) {
                toggleBtn.addEventListener('click', () => {
                    navMenu.classList.toggle('hidden');
                    navMenu.classList.add('flex', 'flex-col', 'absolute', 'top-[72px]', 'left-0', 'w-full', 'bg-white', 'p-8', 'shadow-xl', 'z-50');
                });
            }
        }

        function highlightActiveLink() {
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('.nav-link');
            navLinks.forEach(link => {
                const href = link.getAttribute('href');
                if (currentPath.endsWith(href) || (currentPath === '/' && href.includes('index.html'))) {
                    link.classList.add('text-primary', 'font-semibold', 'border-b-2', 'border-primary');
                    link.classList.remove('text-slate-700');
                }
            });
        }

        async function syncPageBanner() {
            const path = window.location.pathname;
            const slug = path.split("/").pop().replace(".html", "") || "contact";
            try {
                const response = await fetch(`https://noddfa-j3nkslkrxc.live-website.com/wp-json/wp/v2/pages?slug=${slug}`);
                const data = await response.json();
                if (data && data.length > 0 && data[0].acf?.hero_benner_header) {
                    const headerElement = document.getElementById('hero-header');
                    if (headerElement) headerElement.innerHTML = data[0].acf.hero_benner_header;
                }
            } catch (error) {
                console.error("Banner sync failed:", error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadSharedComponents();
            syncPageBanner();
        });
    </script>
</body>
</html>
